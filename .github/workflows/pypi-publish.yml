# ============================================================
# PyPI 自动发布工作流
#
# 触发方式:
#   1. 推送 tag 格式 v*.*.*  (如 v1.0.0) → 自动构建并发布到 PyPI
#   2. 手动触发 (workflow_dispatch) → 可指定 Test-PyPI 或正式 PyPI
#
# 前置条件:
#   在 GitHub 仓库设置 Secrets and variables → Actions 中添加:
#     - PYPI_API_TOKEN:   正式 PyPI API Token
#     - TEST_PYPI_API_TOKEN: Test-PyPI API Token (可选)
# ============================================================

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "发布目标环境"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - test-pypi

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # 允许 OIDC token (Trusted Publishing)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Verify distribution
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to Test PyPI (manual only)
        if: >
          github.event_name == 'workflow_dispatch'
          && github.event.inputs.environment == 'test-pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI (tag push or manual)
        if: >
          github.event_name == 'push'
          || (github.event_name == 'workflow_dispatch'
              && github.event.inputs.environment == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
